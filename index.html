	<script>
(function applyConfig() {
  let cfg = {};
  try { cfg = JSON.parse(localStorage.getItem('bingoConfig')) || {}; } catch {}

  // Logo
  const logoEl = document.getElementById('venueLogo');
  if (logoEl) {
    if (cfg.showlogo === false) {
      logoEl.closest('.static-section').style.display = 'none';
    } else if (cfg.logo) {
      logoEl.src = cfg.logo;
    } else {
      const svg = `<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
        <rect width="300" height="120" rx="14" fill="#1a1a2e"/>
        <text x="150" y="52" font-family="Arial Black, Arial" font-weight="900" font-size="38" fill="#e94560" text-anchor="middle" letter-spacing="4">BINGO</text>
        <text x="150" y="90" font-family="Arial, sans-serif" font-size="18" fill="#aaa" text-anchor="middle" letter-spacing="6">NIGHT</text>
      </svg>`;
      logoEl.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }
  }

  // Wildcard — hide the entire toggle if disabled
  const wcToggle = document.getElementById('enableWildcard');
  const wcWrap = document.querySelector('.wildcard-toggle');
  if (cfg.wildcard === false) {
    if (wcWrap) wcWrap.style.display = 'none';
    if (wcToggle) wcToggle.checked = false;
  } else {
    if (wcToggle) wcToggle.checked = true;
  }

  // Ball counter
  const counter = document.getElementById('ballCounter');
  if (counter && cfg.counter === false) counter.style.display = 'none';

  // Last ball display
  const lastBall = document.querySelector('.last-number');
  if (lastBall && cfg.lastball === false) lastBall.style.display = 'none';

  // Pattern dropdown — filter to selected only
  if (cfg.patterns && cfg.patterns.length > 0) {
    const select = document.getElementById('patterns');
    if (select) {
      [...select.options].forEach(opt => {
        if (!cfg.patterns.includes(opt.value)) opt.remove();
      });
    }
  }
})();
</script>
